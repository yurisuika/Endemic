plugins {
    id "dev.architectury.loom" version "1.13-SNAPSHOT"
    id "com.modrinth.minotaur" version "2.+"
    id "com.matthewprenger.cursegradle" version "1.4.+"
}

base {
    archivesName = mod_id
}

repositories {
    maven { url = "https://maven.parchmentmc.org/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${parchment_version}@zip")
    }
    forge "net.minecraftforge:forge:${minecraft_version}-${api_version}"
}

processResources {
    var properties = [
            java_version: java_version,
            minecraft_version: minecraft_version,
            minecraft_version_range: minecraft_version_range,
            parchment_version: parchment_version,
            api_version: api_version,
            api_version_range: api_version_range,
            loader_version: loader_version,
            loader_version_range: loader_version_range,
            mod_id: mod_id,
            mod_name: mod_name,
            mod_version: mod_version,
            mod_author: mod_author,
            mod_group: mod_group,
            mod_description: mod_description,
            mod_license: mod_license
    ]
    inputs.properties properties

    filesMatching("META-INF/mods.toml") {
        expand properties + [project: project]
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release = 16
}

loom {
    mixin {
        useLegacyMixinAp = true
        defaultRefmapName = "${mod_id}.refmap.json"
    }
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_16
    targetCompatibility = JavaVersion.VERSION_16

    version = mod_version
    group = mod_group
}

jar {
    from "LICENSE"

    jar.archiveAppendix.set("forge-${minecraft_version}")
    sourcesJar.archiveAppendix.set("forge-${minecraft_version}")
    remapJar.archiveAppendix.set("forge-${minecraft_version}")
    remapSourcesJar.archiveAppendix.set("forge-${minecraft_version}")

    exclude ".cache"
}

modrinth {
    token = System.getenv("MODRINTH_TOKEN")
    projectId = "${repo_id_modrinth}"
    versionName = "${mod_name} ${mod_version} (Forge ${minecraft_version})"
    versionNumber = "Forge-${minecraft_version}-${mod_version}"
    versionType = "release"
    loaders = [
            "forge"
    ]
    gameVersions = [
            "1.17",
            "1.17.1"
    ]
    changelog = project.file("CHANGELOG.md").text
    uploadFile = remapJar
    dependencies {}
    debugMode = true
}

curseforge {
    apiKey = System.getenv("CURSEFORGE_TOKEN")
    project {
        id = "${repo_id_curseforge}"
        releaseType = "release"
        changelog = project.file("CHANGELOG.md").text
        changelogType = "markdown"
        gameVersionStrings = [
                "Server",

                "Java ${java_version}",

                "Forge",

                "1.17",
                "1.17.1"
        ]
        mainArtifact(remapJar) {
            displayName = "${mod_name} ${mod_version} (Forge ${minecraft_version})"
            relations {}
        }
    }
    options {
        debug = true
    }
}