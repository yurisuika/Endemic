plugins {
    id "fabric-loom" version "1.13-SNAPSHOT"
    id "com.modrinth.minotaur" version "2.+"
    id "com.matthewprenger.cursegradle" version "1.4.+"
}

base {
    archivesName = mod_id
}

repositories {
    maven { url = "https://maven.parchmentmc.org/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${parchment_version}@zip")
    }
    modImplementation "net.fabricmc:fabric-loader:${loader_version}"

    modImplementation "net.fabricmc.fabric-api:fabric-api:${api_version}"
}

processResources {
    var properties = [
            java_version: java_version,
            minecraft_version: minecraft_version,
            minecraft_version_range: minecraft_version_range,
            parchment_version: parchment_version,
            api_version: api_version,
            api_version_range: api_version_range,
            loader_version: loader_version,
            loader_version_range: loader_version_range,
            mod_id: mod_id,
            mod_name: mod_name,
            mod_version: mod_version,
            mod_author: mod_author,
            mod_group: mod_group,
            mod_description: mod_description,
            mod_license: mod_license
    ]
    inputs.properties properties

    filesMatching("fabric.mod.json") {
        expand properties + [project: project]
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release = 21
}

fabricApi {
    configureDataGeneration() {
        client = true
        outputDirectory = file("src/generated/resources")
    }
}

loom {
    accessWidenerPath = file("src/main/resources/${mod_id}.accesswidener")

    mixin {
        defaultRefmapName = "${mod_id}.refmap.json"
    }
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21

    version = mod_version
    group = mod_group
}

jar {
    from "LICENSE"

    jar.archiveAppendix.set("fabric-${minecraft_version}")
    sourcesJar.archiveAppendix.set("fabric-${minecraft_version}")
    remapJar.archiveAppendix.set("fabric-${minecraft_version}")
    remapSourcesJar.archiveAppendix.set("fabric-${minecraft_version}")

    exclude ".cache"
}

modrinth {
    token = System.getenv("MODRINTH_TOKEN")
    projectId = "${repo_id_modrinth}"
    versionName = "${mod_name} ${mod_version} (Fabric ${minecraft_version})"
    versionNumber = "Fabric-${minecraft_version}-${mod_version}"
    versionType = "release"
    loaders = [
            "fabric"
    ]
    gameVersions = [
            "25w02a",
            "25w03a",
            "25w04a",
            "25w05a",
            "25w06a",
            "25w07a",
            "25w08a",
            "25w09a",
            "25w09b",
            "25w10a",
            "1.21.5-pre1",
            "1.21.5-pre2",
            "1.21.5-pre3",
            "1.21.5-rc1",
            "1.21.5-rc2",
            "1.21.5",
            "25w14craftmine",
            "25w15a",
            "25w16a",
            "25w17a",
            "25w18a",
            "25w19a",
            "25w20a",
            "25w21a",
            "1.21.6-pre1",
            "1.21.6-pre2",
            "1.21.6-pre3",
            "1.21.6-pre4",
            "1.21.6-rc1",
            "1.21.6",
            "1.21.7-rc1",
            "1.21.7-rc2",
            "1.21.7",
            "1.21.8-rc1",
            "1.21.8",
            "25w31a",
            "25w32a",
            "25w33a",
            "25w34a",
            "25w34b",
            "25w35a",
            "25w36a",
            "25w36b",
            "25w37a",
            "1.21.9-pre1",
            "1.21.9-pre2",
            "1.21.9-pre3",
            "1.21.9-pre4",
            "1.21.9-rc1",
            "1.21.9",
            "1.21.10-rc1",
            "1.21.10"
    ]
    changelog = project.file("CHANGELOG.md").text
    uploadFile = remapJar
    dependencies {
        required.project "fabric-api"
    }
    debugMode = true
}

curseforge {
    apiKey = System.getenv("CURSEFORGE_TOKEN")
    project {
        id = "${repo_id_curseforge}"
        releaseType = "release"
        changelog = project.file("CHANGELOG.md").text
        changelogType = "markdown"
        gameVersionStrings = [
                "Server",

                "Java ${java_version}",

                "Fabric",

                "1.21.5-Snapshot",
                "1.21.5",
                "1.21.6-Snapshot",
                "1.21.6",
                "1.21.7",
                "1.21.8",
                "1.21.9-Snapshot",
                "1.21.9",
                "1.21.10"
        ]
        mainArtifact(remapJar) {
            displayName = "${mod_name} ${mod_version} (Fabric ${minecraft_version})"
            relations {
                requiredDependency("fabric-api")
            }
        }
    }
    options {
        debug = true
    }
}