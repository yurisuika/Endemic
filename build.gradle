plugins {
    id "dev.architectury.loom" version "1.11-SNAPSHOT"
    id "maven-publish"
}

base {
    archivesName = project.mod_id
}

repositories {
    maven { url = "https://maven.parchmentmc.org/" }
    maven { url = "https://maven.neoforged.net/releases/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.layered() {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${project.minecraft_version}:${project.parchment_version}@zip")
    }
    neoForge "net.neoforged:neoforge:${project.neo_version}"
}

processResources {
    inputs.property "version", project.mod_version

    filesMatching("META-INF/neoforge.mods.toml") {
        expand "version": project.mod_version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release = 21
}

sourceSets {
    main {
        resources.srcDir file("src/generated/resources")
    }
}

loom {
    mixin {
        useLegacyMixinAp = true
        defaultRefmapName = "${project.mod_id}.refmap.json"
    }

    runs {
        datagen {
            data()
            programArgs "--all"
            programArgs "--mod", "${project.mod_id}"
            programArgs "--output", file("src/generated/resources").absolutePath
            programArgs "--existing", file("src/main/resources").absolutePath
        }
    }
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21

    version = project.mod_version
    group = project.maven_group
}

jar {
    from("LICENSE")
    jar.archiveAppendix.set("neoforge-${project.minecraft_version}")
    sourcesJar.archiveAppendix.set("neoforge-${project.minecraft_version}")
    remapJar.archiveAppendix.set("neoforge-${project.minecraft_version}")
    remapSourcesJar.archiveAppendix.set("neoforge-${project.minecraft_version}")
    exclude ".cache"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact(remapJar) {
                builtBy remapJar
            }
            artifact(sourcesJar) {
                builtBy remapSourcesJar
            }
        }
    }

    repositories {
    }
}